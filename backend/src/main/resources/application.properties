# 프로젝트 이름
spring.application.name=smart_recruit

# DB 연결 설정 (MySQL 연동 전이라면 아래처럼 H2 설정 추천)
# spring.h2.console.enabled=true
# spring.datasource.url=jdbc:h2:mem:testdb
# spring.datasource.driver-class-name=org.h2.Driver
# spring.datasource.username=sa
# spring.datasource.password=

# MySQL 연동 설정 (MySQL 연동 시 아래 설정으로 변경)
spring.datasource.url=jdbc:mysql://localhost:3306/smart_recruit?serverTimezone=Asia/Seoul&characterEncoding=UTF-8
spring.datasource.username=smart
spring.datasource.password=1234
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA/Hibernate 설정
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true