<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>커뮤니티 | Smart Recruit</title>
    <style>
        body {
            margin: 0;
            background: #f5f6f8;
            color: #222831;
            font-family: Arial, "Noto Sans KR", sans-serif;
        }

        .page {
            max-width: 1040px;
            margin: 0 auto;
            padding: 40px 20px;
        }

        .header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 16px;
            margin-bottom: 24px;
        }

        h1 {
            margin: 0;
            font-size: 30px;
            letter-spacing: 0;
        }

        .write-button {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            min-height: 40px;
            padding: 0 16px;
            border-radius: 6px;
            background: #1769aa;
            color: #ffffff;
            font-size: 14px;
            font-weight: 700;
            text-decoration: none;
        }

        .tabs {
            display: flex;
            gap: 8px;
            margin-bottom: 16px;
        }

        .tab {
            padding: 9px 13px;
            border: 1px solid #d7dde4;
            border-radius: 6px;
            background: #ffffff;
            color: #344054;
            font-size: 14px;
            font-weight: 700;
            text-decoration: none;
        }

        .tab.active {
            border-color: #1769aa;
            background: #e8f1fa;
            color: #1769aa;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            background: #ffffff;
            border: 1px solid #dde3ea;
        }

        th,
        td {
            padding: 14px 16px;
            border-bottom: 1px solid #e7ebf0;
            text-align: left;
            font-size: 14px;
        }

        th {
            background: #eef2f6;
            color: #4b5563;
            font-size: 13px;
        }

        .empty {
            padding: 52px 16px;
            color: #667085;
            text-align: center;
        }

        @media (max-width: 720px) {
            .page {
                padding: 28px 14px;
            }

            .header {
                align-items: flex-start;
                flex-direction: column;
            }

            .hide-mobile {
                display: none;
            }

            th,
            td {
                padding: 12px 10px;
            }
        }
    </style>
</head>
<body>
<main class="page">
    <div class="header">
        <h1>커뮤니티</h1>
        <a class="write-button" href="#">글쓰기</a>
    </div>

    <nav class="tabs" aria-label="게시판 카테고리">
        <a class="tab active" href="#">전체</a>
        <a class="tab" href="#">정보</a>
        <a class="tab" href="#">질문</a>
        <a class="tab" href="#">자유</a>
    </nav>

    <table>
        <thead>
        <tr>
            <th>번호</th>
            <th>카테고리</th>
            <th>제목</th>
            <th class="hide-mobile">작성자</th>
            <th class="hide-mobile">조회</th>
            <th class="hide-mobile">작성일</th>
        </tr>
        </thead>
        <tbody>
        <tr>
            <td class="empty" colspan="6">아직 등록된 게시글이 없습니다.</td>
        </tr>
        </tbody>
    </table>
</main>
</body>
</html>
